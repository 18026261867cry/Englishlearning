<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📚 我的单词库</title>
    <style>
        :root {
            --primary: #2d7aff;
            --primary-light: #eef4ff;
            --danger: #ff3b30;
            --danger-light: #ffebee;
            --success: #34c759;
            --bg-body: #f7f9fc;
            --text-main: #1c1e21;
            --text-sub: #606770;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* 顶部固定区域 */
        .top-container { background: #ffffff; border-bottom: 1px solid rgba(0,0,0,0.06); flex-shrink: 0; z-index: 10; }

        /* 搜索框 */
        .header { padding: 12px 16px 8px 16px; }
        .search-box { display: flex; align-items: center; background: #f0f2f5; border-radius: 12px; padding: 0 14px; height: 42px; transition: all 0.2s; }
        .search-box:focus-within { background: #fff; box-shadow: 0 0 0 2px var(--primary); }
        .search-box input { border: none; background: transparent; flex: 1; outline: none; font-size: 15px; color: var(--text-main); }
        .search-box input::placeholder { color: #8d949e; }
        .search-icon { color: #8d949e; margin-right: 8px; font-size: 16px; }

        /* 主视图切换 */
        .main-tabs { display: flex; padding: 4px 16px 8px 16px; gap: 8px; }
        .tab-main-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px; padding: 9px; border-radius: 12px; border: none; font-size: 13px; font-weight: 600; background: #f0f2f5; color: var(--text-sub); cursor: pointer; transition: all 0.2s; }
        .tab-main-btn.active { background: var(--primary); color: #fff; box-shadow: 0 4px 10px rgba(45,122,255,0.25); }
        .tab-main-btn.fav-tab.active { background: var(--danger); box-shadow: 0 4px 10px rgba(255,59,48,0.25); }
        .tab-main-btn.recite-btn { background: #eef4ff; color: var(--primary); border: 1px solid rgba(45,122,255,0.2); }

        /* 次级过滤栏 */
        .sub-filter-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 16px 10px 16px; border-top: 1px dashed #f0f2f5; font-size: 13px; color: var(--text-sub); }
        .filter-left { display: flex; align-items: center; gap: 8px; }
        .filter-select-wrapper { display: flex; align-items: center; gap: 4px; background: #f0f2f5; padding: 4px 8px; border-radius: 8px; }
        .filter-select-wrapper select { border: none; background: transparent; font-size: 12px; font-weight: 600; color: var(--text-main); outline: none; cursor: pointer; }
        
        .mask-toggle { display: flex; align-items: center; gap: 4px; font-size: 12px; cursor: pointer; background: #f0f2f5; padding: 4px 8px; border-radius: 8px; user-select: none; }
        .mask-toggle input { cursor: pointer; }

        .sync-indicator { font-size: 11px; color: #8d949e; }
        .sync-indicator.synced { color: #34c759; }
        .sync-indicator.syncing { color: #ff9500; }
        .sync-indicator.error { color: var(--danger); }

        /* 主内容滚动区 */
        .main-content { flex: 1; overflow-y: auto; padding: 12px 16px 30px 16px; scroll-behavior: smooth; }

        /* 字母分组标题 */
        .letter-header { font-size: 18px; font-weight: 800; color: var(--primary); padding: 14px 0 6px 0; border-bottom: 2px solid #eef2f7; margin-top: 10px; display: flex; align-items: center; justify-content: space-between; }
        .letter-header:first-of-type { margin-top: 0; }

        /* 单词卡片 */
        .word-card { background: #ffffff; border-radius: 14px; padding: 14px 16px; margin: 10px 0; box-shadow: var(--card-shadow); transition: transform 0.15s, box-shadow 0.15s; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; border: 1px solid rgba(0,0,0,0.02); }
        .word-card:active { transform: scale(0.985); }
        .word-left { flex: 1; min-width: 0; }
        .word-header-line { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
        .word-text { font-size: 18px; font-weight: 700; color: var(--text-main); letter-spacing: -0.2px; }
        .tag-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: #f0f2f5; color: var(--text-sub); }

        .word-meaning { font-size: 14px; color: var(--text-sub); line-height: 1.5; white-space: pre-wrap; margin-top: 4px; transition: all 0.2s; }
        
        body.mask-mode .word-meaning { filter: blur(6px); background: #eee; border-radius: 4px; user-select: none; cursor: pointer; }
        body.mask-mode .word-meaning:hover, body.mask-mode .word-meaning:active { filter: none; background: transparent; }

        .card-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        
        /* 按钮通用 */
        .icon-btn { font-size: 20px; cursor: pointer; background: none; border: none; padding: 2px; transition: transform 0.2s; color: #d1d5db; line-height: 1; }
        .star-btn.active { color: #f5a623; transform: scale(1.1); }
        .remove-wrong-btn { color: #8d949e; font-size: 16px; }
        .remove-wrong-btn:active { transform: scale(1.2); color: var(--danger); }

        /* 右侧字母快捷索引 */
        .letter-index { position: fixed; right: 2px; top: 55%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 1px; z-index: 20; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); padding: 4px 2px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .letter-index span { display: block; font-size: 10px; font-weight: 700; color: var(--primary); width: 18px; height: 18px; line-height: 18px; text-align: center; border-radius: 50%; cursor: pointer; }
        .letter-index span:active { background: var(--primary); color: #fff; }

        /* ================= 🃏 背诵全屏弹窗 ================= */
        .recite-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100%; height: 100dvh;
            background: #f7f9fc;
            z-index: 100;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .recite-modal.show { opacity: 1; pointer-events: auto; }

        .recite-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: #fff; border-bottom: 1px solid rgba(0,0,0,0.05); flex-shrink: 0; }
        .recite-title { font-weight: 700; font-size: 15px; }
        .close-btn { border: none; background: #f0f2f5; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; }

        .recite-mode-selector { display: flex; justify-content: center; gap: 10px; margin: 12px 20px 0 20px; flex-shrink: 0; }
        .mode-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #d0d7de; background: #fff; font-size: 12px; font-weight: 600; color: var(--text-sub); cursor: pointer; }
        .mode-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .recite-card-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px 20px; min-height: 260px; flex-shrink: 0; }
        
        .flash-card { width: 100%; max-width: 340px; min-height: 240px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; flex-direction: column; justify-content: space-between; padding: 20px; position: relative; cursor: pointer; border: 1px solid rgba(0,0,0,0.03); }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .card-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px 0; }
        .card-word { font-size: 26px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; word-break: break-word; }
        .card-meaning-text { font-size: 15px; color: var(--text-sub); line-height: 1.5; visibility: hidden; opacity: 0; transition: opacity 0.2s; }
        .card-meaning-text.show { visibility: visible; opacity: 1; }
        .tap-tip { font-size: 12px; color: #b0b8c4; margin-top: 8px; }

        .recite-footer { padding: 12px 20px calc(16px + env(safe-area-inset-bottom, 0px)) 20px; background: #fff; border-top: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .progress-bar-bg { width: 100%; height: 6px; background: #f0f2f5; border-radius: 3px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s; }
        
        .recite-actions { display: flex; gap: 12px; }
        .action-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.96); }
        .btn-know { background: #e8f8ee; color: var(--success); }
        .btn-unknow { background: #ffebee; color: var(--danger); }

        .empty { text-align: center; padding: 80px 20px; color: #8d949e; font-size: 15px; }
        .loading { text-align: center; padding: 80px 20px; color: #8d949e; }
    </style>
</head>
<body>

    <div class="top-container">
        <!-- 搜索栏 -->
        <div class="header">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索单词或释义..." autocomplete="off">
            </div>
        </div>

        <!-- 主 Tab -->
        <div class="main-tabs">
            <button class="tab-main-btn active" id="btnAllTab">
                <span>📚 全部</span>
                <span id="countAll">(0)</span>
            </button>
            <button class="tab-main-btn fav-tab" id="btnFavTab">
                <span>❤️ 收藏</span>
                <span id="countFav">(0)</span>
            </button>
            <button class="tab-main-btn recite-btn" id="btnOpenRecite">
                <span>🃏 开始抽背</span>
            </button>
        </div>

        <!-- 次级筛选 -->
        <div class="sub-filter-bar">
            <div class="filter-left">
                <div class="filter-select-wrapper">
                    <span>📁 筛选：</span>
                    <select id="groupSelect">
                        <option value="全部">全部分组</option>
                        <option value="__WRONG_LIST__">📕 错题本</option>
                        <option value="__ONLY_WORDS__">🔤 仅看单词</option>
                        <option value="__ONLY_PHRASES__">💬 仅看短语</option>
                    </select>
                </div>
                <!-- 🙈 遮挡释义 开关 -->
                <label class="mask-toggle">
                    <input type="checkbox" id="maskModeCheckbox">
                    <span>🙈 遮挡释义</span>
                </label>
            </div>
            
            <div class="sync-indicator synced" id="syncStatus">☁️ 已同步</div>
        </div>
    </div>

    <!-- 列表容器 -->
    <div class="main-content" id="mainContent">
        <div class="loading">⏳ 加载单词库中...</div>
    </div>

    <!-- 右侧字母快捷索引 -->
    <div class="letter-index" id="letterIndex"></div>

    <!-- ================= 🃏 背诵全屏弹窗 ================= -->
    <div class="recite-modal" id="reciteModal">
        <div class="recite-header">
            <div class="recite-title" id="reciteScopeTitle">抽背模式</div>
            <button class="close-btn" id="btnCloseRecite">✕</button>
        </div>

        <div class="recite-mode-selector">
            <button class="mode-btn active" id="btnModeRandom">🎲 随机抽背</button>
            <button class="mode-btn" id="btnModeOrder">🔤 顺序背诵</button>
        </div>

        <div class="recite-card-container">
            <div class="flash-card" id="flashCard">
                <div class="card-top">
                    <span class="tag-badge" id="cardTag">List 1</span>
                    <button class="icon-btn star-btn" id="cardStarBtn">☆</button>
                </div>
                <div class="card-center">
                    <div class="card-word" id="cardWord">Word</div>
                    <div class="card-meaning-text" id="cardMeaning">释义...</div>
                    <div class="tap-tip" id="tapTip">👆 点击卡片显示释义</div>
                </div>
                <div style="text-align: center; font-size: 12px; color: #a0a0a0;" id="cardIndexText">1 / 10</div>
            </div>
        </div>

        <div class="recite-footer">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="reciteProgressBar"></div>
            </div>
            <div class="recite-actions">
                <button class="action-btn btn-unknow" id="btnUnknow">❌ 没记住</button>
                <button class="action-btn btn-know" id="btnKnow">✅ 记住了</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // JSONBin 配置项
        // ============================================================
        const DATA_URL = 'https://ghproxy.net/https://raw.githubusercontent.com/18026261867cry/Englishlearning/refs/heads/main/vocabulary_list.json';
        const JSONBIN_BIN_ID = '6a6194b7da38895dfe826c68'; 
        const JSONBIN_API_KEY = '$2a$10$XrPLO2BgVEmb62nVI/rQneSm/dQf1yW5C84ROPDoseaFxuUU/.qbi';
        
        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
        // ============================================================

        let allWords = [];
        let currentTab = '全部'; // '全部' 或 '收藏'
        let selectedGroup = '全部';
        let searchKeyword = '';
        
        let favorites = []; 
        let wrongList = []; // 错题本数据
        
        let isSyncing = false;

        // 背诵状态变量
        let reciteList = [];
        let reciteIndex = 0;
        let isRandomMode = true;
        let isMeaningShown = false;

        // ---------- 读取/写入云端数据（聚合收藏与错题） ----------
        async function fetchUserDataFromCloud() {
            try {
                const res = await fetch(JSONBIN_URL, { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                let record = data.record;
                
                let favs = [];
                let wrongs = [];

                if (Array.isArray(record)) {
                    // 兼容旧格式（纯字符串数组）
                    favs = record.map(item => typeof item === 'string' ? item : item.word).filter(Boolean);
                } else if (record && typeof record === 'object') {
                    // 新格式：{ favorites: [], wrongList: [] }
                    favs = record.favorites || [];
                    wrongs = record.wrongList || [];
                }
                return { favorites: favs, wrongList: wrongs };
            } catch (err) {
                return getLocalUserData();
            }
        }

        async function saveUserDataToCloud() {
            if (isSyncing) return;
            isSyncing = true;
            updateSyncStatus('syncing', '⏳ 同步中');

            const payload = {
                favorites: favorites,
                wrongList: wrongList
            };

            try {
                const res = await fetch(JSONBIN_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                localStorage.setItem('user_data_cache', JSON.stringify(payload));
                updateSyncStatus('synced', '☁️ 已同步');
            } catch (err) {
                updateSyncStatus('error', '⚠️ 暂存本地');
                localStorage.setItem('user_data_cache', JSON.stringify(payload));
            } finally {
                isSyncing = false;
            }
        }

        function getLocalUserData() {
            try { 
                const raw = localStorage.getItem('user_data_cache');
                return raw ? JSON.parse(raw) : { favorites: [], wrongList: [] };
            } catch { 
                return { favorites: [], wrongList: [] }; 
            }
        }

        function toggleFavorite(wordText) {
            const idx = favorites.indexOf(wordText);
            if (idx > -1) favorites.splice(idx, 1);
            else favorites.push(wordText);
            updateTabCounts();
            render();
            saveUserDataToCloud();
        }

        function toggleWrongList(wordText, forceAdd = false) {
            const idx = wrongList.indexOf(wordText);
            if (forceAdd) {
                if (idx === -1) wrongList.push(wordText);
            } else {
                if (idx > -1) wrongList.splice(idx, 1);
                else wrongList.push(wordText);
            }
            updateGroupOptionLabels();
            render();
            saveUserDataToCloud();
        }

        function isFavorite(wordText) { return favorites.includes(wordText); }
        function isWrong(wordText) { return wrongList.includes(wordText); }

        function updateSyncStatus(status, msg) {
            const el = document.getElementById('syncStatus');
            el.className = `sync-indicator ${status}`;
            el.textContent = msg;
        }

        function isPhrase(item) { return item.meaning && item.meaning.includes('phr.'); }

        // ---------- Dropdown 初始化与更新 ----------
        function initGroupSelect() {
            const set = new Set();
            allWords.forEach(item => set.add(item.list || '未分类'));
            const groups = Array.from(set).sort((a, b) => {
                const numA = parseInt(a.replace(/\D/g, '')) || 0;
                const numB = parseInt(b.replace(/\D/g, '')) || 0;
                return numA - numB;
            });

            const selectEl = document.getElementById('groupSelect');
            selectEl.innerHTML = `
                <option value="全部">全部分组</option>
                <option value="__WRONG_LIST__" id="wrongOption">📕 错题本 (${wrongList.length})</option>
                <option value="__ONLY_WORDS__">🔤 仅看单词</option>
                <option value="__ONLY_PHRASES__">💬 仅看短语</option>
                <option disabled>──────────</option>
            `;
            groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = `📁 ${g}`;
                selectEl.appendChild(opt);
            });

            selectEl.addEventListener('change', (e) => {
                selectedGroup = e.target.value;
                render();
            });
        }

        function updateGroupOptionLabels() {
            const opt = document.getElementById('wrongOption');
            if (opt) opt.textContent = `📕 错题本 (${wrongList.length})`;
        }

        function updateTabCounts() {
            document.getElementById('countAll').textContent = `(${allWords.length})`;
            document.getElementById('countFav').textContent = `(${favorites.length})`;
        }

        // ---------- 数据过滤 ----------
        function getFilteredData() {
            let data = allWords;

            if (currentTab === '收藏') {
                data = data.filter(item => favorites.includes(item.word));
            }

            if (selectedGroup === '__WRONG_LIST__') {
                data = data.filter(item => wrongList.includes(item.word));
            } else if (selectedGroup === '__ONLY_PHRASES__') {
                data = data.filter(item => isPhrase(item));
            } else if (selectedGroup === '__ONLY_WORDS__') {
                data = data.filter(item => !isPhrase(item));
            } else if (selectedGroup !== '全部') {
                data = data.filter(item => (item.list || '未分类') === selectedGroup);
            }

            if (searchKeyword.trim() !== '') {
                const kw = searchKeyword.trim().toLowerCase();
                data = data.filter(item =>
                    item.word.toLowerCase().includes(kw) ||
                    (item.meaning && item.meaning.toLowerCase().includes(kw))
                );
            }
            return data;
        }

        function groupByLetter(data) {
            const groups = {};
            data.forEach(item => {
                const firstChar = item.word.charAt(0).toUpperCase();
                if (!groups[firstChar]) groups[firstChar] = [];
                groups[firstChar].push(item);
            });
            return { groups, sortedKeys: Object.keys(groups).sort() };
        }

        // ---------- 主列表渲染 ----------
        function render() {
            const container = document.getElementById('mainContent');
            const filtered = getFilteredData();

            if (filtered.length === 0) {
                let msg = '😅 没找到符合要求的单词/短语';
                if (selectedGroup === '__WRONG_LIST__') {
                    msg = '🎉 错题本空空如也，太棒了！';
                } else if (currentTab === '收藏' && favorites.length === 0) {
                    msg = '💔 暂无收藏内容<br><span style="font-size:13px;color:#abb2bf;">点击单词右侧的 ⭐ 即可收藏</span>';
                }
                container.innerHTML = `<div class="empty">${msg}</div>`;
                document.getElementById('letterIndex').innerHTML = '';
                return;
            }

            const { groups, sortedKeys } = groupByLetter(filtered);

            const indexContainer = document.getElementById('letterIndex');
            indexContainer.innerHTML = '';
            sortedKeys.forEach(letter => {
                const span = document.createElement('span');
                span.textContent = letter;
                span.addEventListener('click', () => {
                    const target = document.getElementById(`letter-${letter}`);
                    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                indexContainer.appendChild(span);
            });

            let html = '';
            sortedKeys.forEach(letter => {
                const items = groups[letter];
                html += `<div class="letter-header" id="letter-${letter}"><span>${letter}</span></div>`;
                items.forEach(item => {
                    const tag = item.list || '未分类';
                    const meaningHtml = (item.meaning || '').replace(/\n/g, '<br>');
                    const fav = isFavorite(item.word);
                    const wrong = isWrong(item.word);
                    
                    html += `
                        <div class="word-card">
                            <div class="word-left">
                                <div class="word-header-line">
                                    <span class="word-text">${item.word}</span>
                                    <span class="tag-badge">${tag}</span>
                                </div>
                                <div class="word-meaning">${meaningHtml}</div>
                            </div>
                            <div class="card-actions">
                                ${selectedGroup === '__WRONG_LIST__' ? `<button class="icon-btn remove-wrong-btn" data-word="${item.word}" title="移出错题本">🧹</button>` : ''}
                                <button class="icon-btn star-btn ${fav ? 'active' : ''}" data-word="${item.word}">${fav ? '★' : '☆'}</button>
                            </div>
                        </div>
                    `;
                });
            });
            container.innerHTML = html;

            // 绑定收藏与移除错题事件
            container.querySelectorAll('.star-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleFavorite(this.dataset.word);
                });
            });

            container.querySelectorAll('.remove-wrong-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleWrongList(this.dataset.word);
                });
            });
        }

        // ============================================================
        // 🃏 背诵模式核心逻辑
        // ============================================================
        function startRecite() {
            const sourceData = getFilteredData();
            if (sourceData.length === 0) {
                alert('当前筛选状态下没有可以背诵的单词！');
                return;
            }

            reciteList = [...sourceData];
            if (isRandomMode) {
                reciteList.sort(() => Math.random() - 0.5);
            }
            reciteIndex = 0;

            let title = `背诵: ${currentTab}`;
            if (selectedGroup !== '全部') {
                const selObj = document.getElementById('groupSelect');
                title += ` (${selObj.options[selObj.selectedIndex].text})`;
            }
            document.getElementById('reciteScopeTitle').textContent = title;

            document.getElementById('reciteModal').classList.add('show');
            renderReciteCard();
        }

        function renderReciteCard() {
            if (reciteIndex >= reciteList.length) {
                document.getElementById('cardWord').textContent = '🎉 太棒了！';
                document.getElementById('cardMeaning').innerHTML = '你已经背完了本轮的所有单词！';
                document.getElementById('cardMeaning').classList.add('show');
                document.getElementById('tapTip').style.display = 'none';
                document.getElementById('cardTag').textContent = '完成';
                document.getElementById('cardIndexText').textContent = `${reciteList.length} / ${reciteList.length}`;
                document.getElementById('reciteProgressBar').style.width = '100%';
                return;
            }

            const currentObj = reciteList[reciteIndex];
            isMeaningShown = false;

            document.getElementById('cardWord').textContent = currentObj.word;
            document.getElementById('cardMeaning').innerHTML = (currentObj.meaning || '').replace(/\n/g, '<br>');
            document.getElementById('cardMeaning').classList.remove('show');
            document.getElementById('tapTip').style.display = 'block';
            document.getElementById('cardTag').textContent = currentObj.list || '未分类';

            const starBtn = document.getElementById('cardStarBtn');
            const fav = isFavorite(currentObj.word);
            starBtn.className = `icon-btn star-btn ${fav ? 'active' : ''}`;
            starBtn.textContent = fav ? '★' : '☆';
            starBtn.onclick = (e) => {
                e.stopPropagation();
                toggleFavorite(currentObj.word);
                renderReciteCard();
            };

            document.getElementById('cardIndexText').textContent = `${reciteIndex + 1} / ${reciteList.length}`;
            const pct = ((reciteIndex) / reciteList.length) * 100;
            document.getElementById('reciteProgressBar').style.width = `${pct}%`;
        }

        document.getElementById('flashCard').addEventListener('click', () => {
            if (reciteIndex >= reciteList.length) return;
            isMeaningShown = !isMeaningShown;
            const meaningEl = document.getElementById('cardMeaning');
            const tipEl = document.getElementById('tapTip');
            if (isMeaningShown) {
                meaningEl.classList.add('show');
                tipEl.style.display = 'none';
            } else {
                meaningEl.classList.remove('show');
                tipEl.style.display = 'block';
            }
        });

        // 记住了
        document.getElementById('btnKnow').addEventListener('click', () => {
            if (reciteIndex >= reciteList.length) return;
            reciteIndex++;
            renderReciteCard();
        });

        // 没记住 -> 自动加入错题本，并在队尾重抽
        document.getElementById('btnUnknow').addEventListener('click', () => {
            if (reciteIndex >= reciteList.length) return;
            
            const currentObj = reciteList[reciteIndex];
            toggleWrongList(currentObj.word, true); // 强制加入错题本

            reciteList.push(currentObj);
            reciteIndex++;
            renderReciteCard();
        });

        document.getElementById('btnModeRandom').addEventListener('click', function() {
            isRandomMode = true;
            this.classList.add('active');
            document.getElementById('btnModeOrder').classList.remove('active');
            startRecite();
        });

        document.getElementById('btnModeOrder').addEventListener('click', function() {
            isRandomMode = false;
            this.classList.add('active');
            document.getElementById('btnModeRandom').classList.remove('active');
            startRecite();
        });

        document.getElementById('btnOpenRecite').addEventListener('click', startRecite);
        document.getElementById('btnCloseRecite').addEventListener('click', () => {
            document.getElementById('reciteModal').classList.remove('show');
            render();
        });

        document.getElementById('maskModeCheckbox').addEventListener('change', function() {
            if (this.checked) document.body.classList.add('mask-mode');
            else document.body.classList.remove('mask-mode');
        });

        // ---------- 加载数据 ----------
        async function loadData() {
            try {
                const [wordsRes, cloudData] = await Promise.all([
                    fetch(DATA_URL),
                    fetchUserDataFromCloud()
                ]);
                
                if (!wordsRes.ok) throw new Error('网络请求失败');
                allWords = await wordsRes.json();
                allWords.sort((a, b) => a.word.localeCompare(b.word));

                favorites = cloudData.favorites || [];
                wrongList = cloudData.wrongList || [];
                localStorage.setItem('user_data_cache', JSON.stringify({ favorites, wrongList }));

                initGroupSelect();
                updateTabCounts();
                render();
                updateSyncStatus('synced', '☁️ 已同步');
            } catch (err) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="empty">❌ 加载失败<br><span style="font-size:13px;color:#bbb;">${err.message}</span></div>
                `;
                updateSyncStatus('error', '⚠️ 加载出错');
            }
        }

        // ---------- 事件绑定 ----------
        document.getElementById('btnAllTab').addEventListener('click', function() {
            currentTab = '全部';
            document.getElementById('btnFavTab').classList.remove('active');
            this.classList.add('active');
            render();
        });

        document.getElementById('btnFavTab').addEventListener('click', function() {
            currentTab = '收藏';
            document.getElementById('btnAllTab').classList.remove('active');
            this.classList.add('active');
            render();
        });

        document.getElementById('searchInput').addEventListener('input', function() {
            searchKeyword = this.value;
            render();
        });

        // 启动
        loadData();
    </script>
</body>
</html>

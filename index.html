<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📚 我的单词库</title>
    <style>
        :root {
            --primary: #2d7aff;
            --primary-light: #eef4ff;
            --danger: #ff3b30;
            --danger-light: #ffebee;
            --bg-body: #f7f9fc;
            --text-main: #1c1e21;
            --text-sub: #606770;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* 顶部固定区域 */
        .top-container { background: #ffffff; border-bottom: 1px solid rgba(0,0,0,0.06); flex-shrink: 0; z-index: 10; }

        /* 搜索框 */
        .header { padding: 12px 16px 8px 16px; }
        .search-box { display: flex; align-items: center; background: #f0f2f5; border-radius: 12px; padding: 0 14px; height: 42px; transition: all 0.2s; }
        .search-box:focus-within { background: #fff; box-shadow: 0 0 0 2px var(--primary); }
        .search-box input { border: none; background: transparent; flex: 1; outline: none; font-size: 15px; color: var(--text-main); }
        .search-box input::placeholder { color: #8d949e; }
        .search-icon { color: #8d949e; margin-right: 8px; font-size: 16px; }

        /* 主视图切换（全部 vs 收藏） */
        .main-tabs { display: flex; padding: 4px 16px 10px 16px; gap: 10px; }
        .tab-main-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; background: #f0f2f5; color: var(--text-sub); cursor: pointer; transition: all 0.2s; }
        .tab-main-btn.active { background: var(--primary); color: #fff; box-shadow: 0 4px 10px rgba(45,122,255,0.25); }
        .tab-main-btn.fav-tab.active { background: var(--danger); box-shadow: 0 4px 10px rgba(255,59,48,0.25); }

        /* 次级过滤栏（List 分类筛选） */
        .sub-filter-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 16px 10px 16px; border-top: 1px dashed #f0f2f5; font-size: 13px; color: var(--text-sub); }
        .filter-select-wrapper { display: flex; align-items: center; gap: 6px; background: #f0f2f5; padding: 4px 10px; border-radius: 8px; }
        .filter-select-wrapper select { border: none; background: transparent; font-size: 13px; font-weight: 500; color: var(--text-main); outline: none; cursor: pointer; }
        
        .sync-indicator { font-size: 12px; color: #8d949e; }
        .sync-indicator.synced { color: #34c759; }
        .sync-indicator.syncing { color: #ff9500; }
        .sync-indicator.error { color: var(--danger); }

        /* 主内容滚动区 */
        .main-content { flex: 1; overflow-y: auto; padding: 12px 16px 30px 16px; scroll-behavior: smooth; }

        /* 字母分组标题 */
        .letter-header { font-size: 18px; font-weight: 800; color: var(--primary); padding: 14px 0 6px 0; border-bottom: 2px solid #eef2f7; margin-top: 10px; display: flex; align-items: center; justify-content: space-between; }
        .letter-header:first-of-type { margin-top: 0; }

        /* 单词卡片 */
        .word-card { background: #ffffff; border-radius: 14px; padding: 14px 16px; margin: 10px 0; box-shadow: var(--card-shadow); transition: transform 0.15s, box-shadow 0.15s; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; border: 1px solid rgba(0,0,0,0.02); }
        .word-card:active { transform: scale(0.985); }
        .word-left { flex: 1; min-width: 0; }
        .word-header-line { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
        .word-text { font-size: 18px; font-weight: 700; color: var(--text-main); letter-spacing: -0.2px; }
        
        .tag-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: #f0f2f5; color: var(--text-sub); }

        .word-meaning { font-size: 14px; color: var(--text-sub); line-height: 1.5; white-space: pre-wrap; margin-top: 4px; }

        /* 收藏按钮 */
        .star-btn { flex-shrink: 0; font-size: 24px; cursor: pointer; background: none; border: none; padding: 2px; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #d1d5db; line-height: 1; }
        .star-btn.active { color: #f5a623; transform: scale(1.1); }
        .star-btn:active { transform: scale(1.4); }

        /* 右侧字母快捷索引 */
        .letter-index { position: fixed; right: 2px; top: 55%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 1px; z-index: 20; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); padding: 4px 2px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .letter-index span { display: block; font-size: 10px; font-weight: 700; color: var(--primary); width: 18px; height: 18px; line-height: 18px; text-align: center; border-radius: 50%; cursor: pointer; }
        .letter-index span:active { background: var(--primary); color: #fff; }

        /* 空状态 */
        .empty { text-align: center; padding: 80px 20px; color: #8d949e; font-size: 15px; }
        .loading { text-align: center; padding: 80px 20px; color: #8d949e; }

        @media (max-width: 480px) {
            .word-text { font-size: 17px; }
            .letter-index span { font-size: 9px; width: 16px; height: 16px; line-height: 16px; }
        }
    </style>
</head>
<body>

    <div class="top-container">
        <!-- 搜索栏 -->
        <div class="header">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索单词或释义..." autocomplete="off">
            </div>
        </div>

        <!-- 主 Tab：全部 vs 收藏 -->
        <div class="main-tabs">
            <button class="tab-main-btn active" id="btnAllTab">
                <span>📚 全部</span>
                <span id="countAll">(0)</span>
            </button>
            <button class="tab-main-btn fav-tab" id="btnFavTab">
                <span>❤️ 收藏</span>
                <span id="countFav">(0)</span>
            </button>
        </div>

        <!-- 次级筛选：单元 List & 同步状态 -->
        <div class="sub-filter-bar">
            <div class="filter-select-wrapper">
                <span>📁 分组：</span>
                <select id="groupSelect">
                    <option value="全部">全部分组</option>
                </select>
            </div>
            <div class="sync-indicator synced" id="syncStatus">
                ☁️ 已同步
            </div>
        </div>
    </div>

    <!-- 列表容器 -->
    <div class="main-content" id="mainContent">
        <div class="loading">⏳ 加载单词库中...</div>
    </div>

    <!-- 右侧字母表快捷跳跃 -->
    <div class="letter-index" id="letterIndex"></div>

    <script>
        // ============================================================
        // JSONBin 配置项
        // ============================================================
        const DATA_URL = 'https://ghproxy.net/https://raw.githubusercontent.com/18026261867cry/Englishlearning/refs/heads/main/vocabulary_list.json';
        const JSONBIN_BIN_ID = '6a6194b7da38895dfe826c68'; 
        const JSONBIN_API_KEY = '$2a$10$XrPLO2BgVEmb62nVI/rQneSm/dQf1yW5C84ROPDoseaFxuUU/.qbi';
        
        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
        // ============================================================

        let allWords = [];
        let currentTab = '全部'; // '全部' 或 '收藏'
        let selectedGroup = '全部'; // List 单元选择
        let searchKeyword = '';
        let favorites = []; 
        let isSyncing = false;

        // ---------- 读取云端收藏 ----------
        async function fetchFavoritesFromCloud() {
            try {
                const res = await fetch(JSONBIN_URL, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                let record = data.record;
                if (Array.isArray(record)) {
                    return record.map(item => typeof item === 'string' ? item : item.word).filter(Boolean);
                }
                return [];
            } catch (err) {
                console.warn('读取云端失败，降级本地缓存:', err);
                return getLocalFavorites();
            }
        }

        // ---------- 写入云端收藏 ----------
        async function saveFavoritesToCloud(favList) {
            if (isSyncing) return;
            isSyncing = true;
            updateSyncStatus('syncing', '⏳ 同步中');

            try {
                const res = await fetch(JSONBIN_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(favList)
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                localStorage.setItem('fav_words_cache', JSON.stringify(favList));
                updateSyncStatus('synced', '☁️ 已同步');
            } catch (err) {
                console.error('同步失败:', err);
                updateSyncStatus('error', '⚠️ 暂存本地');
                localStorage.setItem('fav_words_cache', JSON.stringify(favList));
            } finally {
                isSyncing = false;
            }
        }

        function getLocalFavorites() {
            try {
                const cached = localStorage.getItem('fav_words_cache');
                return cached ? JSON.parse(cached) : [];
            } catch { return []; }
        }

        function toggleFavorite(wordText) {
            const idx = favorites.indexOf(wordText);
            if (idx > -1) {
                favorites.splice(idx, 1);
            } else {
                favorites.push(wordText);
            }
            updateTabCounts();
            render();
            saveFavoritesToCloud(favorites);
        }

        function isFavorite(wordText) {
            return favorites.includes(wordText);
        }

        function updateSyncStatus(status, msg) {
            const el = document.getElementById('syncStatus');
            el.className = `sync-indicator ${status}`;
            el.textContent = msg;
        }

        // ---------- 初始化 Dropdown 下拉选项 ----------
        function initGroupSelect() {
            const set = new Set();
            allWords.forEach(item => set.add(item.list || '未分类'));
            const groups = Array.from(set).sort((a, b) => {
                const numA = parseInt(a.replace(/\D/g, '')) || 0;
                const numB = parseInt(b.replace(/\D/g, '')) || 0;
                return numA - numB;
            });

            const selectEl = document.getElementById('groupSelect');
            selectEl.innerHTML = '<option value="全部">全部分组</option>';
            groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                selectEl.appendChild(opt);
            });

            selectEl.addEventListener('change', (e) => {
                selectedGroup = e.target.value;
                render();
            });
        }

        function updateTabCounts() {
            document.getElementById('countAll').textContent = `(${allWords.length})`;
            document.getElementById('countFav').textContent = `(${favorites.length})`;
        }

        // ---------- 数据过滤 ----------
        function getFilteredData() {
            let data = allWords;

            // 1. 视角过滤（全部 vs 收藏）
            if (currentTab === '收藏') {
                data = data.filter(item => favorites.includes(item.word));
            }

            // 2. 分组下拉过滤
            if (selectedGroup !== '全部') {
                data = data.filter(item => (item.list || '未分类') === selectedGroup);
            }

            // 3. 关键词过滤
            if (searchKeyword.trim() !== '') {
                const kw = searchKeyword.trim().toLowerCase();
                data = data.filter(item =>
                    item.word.toLowerCase().includes(kw) ||
                    (item.meaning && item.meaning.toLowerCase().includes(kw))
                );
            }
            return data;
        }

        function groupByLetter(data) {
            const groups = {};
            data.forEach(item => {
                const firstChar = item.word.charAt(0).toUpperCase();
                if (!groups[firstChar]) groups[firstChar] = [];
                groups[firstChar].push(item);
            });
            return { groups, sortedKeys: Object.keys(groups).sort() };
        }

        // ---------- 页面渲染 ----------
        function render() {
            const container = document.getElementById('mainContent');
            const filtered = getFilteredData();

            if (filtered.length === 0) {
                let msg = '😅 没找到符合要求的单词';
                if (currentTab === '收藏' && favorites.length === 0) {
                    msg = '💔 暂无收藏单词<br><span style="font-size:13px;color:#abb2bf;">点击单词右侧的 ⭐ 即可收藏</span>';
                }
                container.innerHTML = `<div class="empty">${msg}</div>`;
                document.getElementById('letterIndex').innerHTML = '';
                return;
            }

            const { groups, sortedKeys } = groupByLetter(filtered);

            // 渲染字母快捷跳转
            const indexContainer = document.getElementById('letterIndex');
            indexContainer.innerHTML = '';
            sortedKeys.forEach(letter => {
                const span = document.createElement('span');
                span.textContent = letter;
                span.addEventListener('click', () => {
                    const target = document.getElementById(`letter-${letter}`);
                    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                indexContainer.appendChild(span);
            });

            // 渲染卡片
            let html = '';
            sortedKeys.forEach(letter => {
                const items = groups[letter];
                html += `<div class="letter-header" id="letter-${letter}"><span>${letter}</span></div>`;
                items.forEach(item => {
                    const tag = item.list || '未分类';
                    const meaningHtml = (item.meaning || '').replace(/\n/g, '<br>');
                    const fav = isFavorite(item.word);
                    
                    html += `
                        <div class="word-card">
                            <div class="word-left">
                                <div class="word-header-line">
                                    <span class="word-text">${item.word}</span>
                                    <span class="tag-badge">${tag}</span>
                                </div>
                                <div class="word-meaning">${meaningHtml}</div>
                            </div>
                            <button class="star-btn ${fav ? 'active' : ''}" data-word="${item.word}">${fav ? '★' : '☆'}</button>
                        </div>
                    `;
                });
            });
            container.innerHTML = html;

            // 绑定收藏事件
            container.querySelectorAll('.star-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleFavorite(this.dataset.word);
                });
            });
        }

        // ---------- 加载数据 ----------
        async function loadData() {
            try {
                const [wordsRes, favs] = await Promise.all([
                    fetch(DATA_URL),
                    fetchFavoritesFromCloud()
                ]);
                
                if (!wordsRes.ok) throw new Error('网络请求失败');
                allWords = await wordsRes.json();
                allWords.sort((a, b) => a.word.localeCompare(b.word));

                favorites = (favs && Array.isArray(favs)) ? favs : getLocalFavorites();
                localStorage.setItem('fav_words_cache', JSON.stringify(favorites));

                initGroupSelect();
                updateTabCounts();
                render();
                updateSyncStatus('synced', '☁️ 已同步');
            } catch (err) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="empty">❌ 加载失败<br><span style="font-size:13px;color:#bbb;">${err.message}</span></div>
                `;
                updateSyncStatus('error', '⚠️ 加载出错');
            }
        }

        // ---------- 事件绑定 ----------
        document.getElementById('btnAllTab').addEventListener('click', function() {
            currentTab = '全部';
            document.getElementById('btnFavTab').classList.remove('active');
            this.classList.add('active');
            render();
        });

        document.getElementById('btnFavTab').addEventListener('click', function() {
            currentTab = '收藏';
            document.getElementById('btnAllTab').classList.remove('active');
            this.classList.add('active');
            render();
        });

        document.getElementById('searchInput').addEventListener('input', function() {
            searchKeyword = this.value;
            render();
        });

        // 启动
        loadData();
    </script>
</body>
</html>

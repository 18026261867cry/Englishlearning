<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的单词库</title>
    <style>
        body { font-family: Arial; padding: 15px; background: #f5f5f5; }
        .word-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .word { font-size: 20px; font-weight: bold; color: #2c3e50; }
        .meaning { font-size: 16px; color: #555; margin-top: 5px; }
        .list-tag { display: inline-block; background: #3498db; color: white; padding: 2px 10px; border-radius: 12px; font-size: 12px; margin-top: 8px; }
        .loading { text-align: center; padding: 50px; color: #888; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .count { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>📚 我的单词库</h2>
        <span class="count" id="count">加载中...</span>
    </div>
    <div id="wordList">
        <div class="loading">⏳ 正在加载单词...</div>
    </div>

    <script>
        // ⚠️ 把下面这个链接换成你的 Gitee RAW 链接！！！
        const DATA_URL = 'https://raw.githubusercontent.com/18026261867cry/Englishlearning/refs/heads/main/vocabulary_list.json';

        async function loadWords() {
            try {
                const response = await fetch(DATA_URL);
                const data = await response.json();
                
                // 按首字母排序（A-Z）
                data.sort((a, b) => a.word.localeCompare(b.word));
                
                // 显示单词数量
                document.getElementById('count').textContent = `${data.length} 个单词`;
                
                // 生成列表
                const container = document.getElementById('wordList');
                container.innerHTML = '';
                
                // 按所属列表分组显示
                const groups = {};
                data.forEach(item => {
                    const listName = item.list || '未分类';
                    if (!groups[listName]) groups[listName] = [];
                    groups[listName].push(item);
                });
                
                for (const [listName, words] of Object.entries(groups)) {
                    // 显示组标题
                    const groupTitle = document.createElement('div');
                    groupTitle.style.cssText = 'font-weight: bold; font-size: 18px; color: #2c3e50; margin: 20px 0 10px 0; border-bottom: 2px solid #3498db; padding-bottom: 5px;';
                    groupTitle.textContent = `📁 ${listName} (${words.length})`;
                    container.appendChild(groupTitle);
                    
                    words.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'word-card';
                        card.innerHTML = `
                            <div class="word">${item.word}</div>
                            <div class="meaning">${item.meaning || ''}</div>
                            <span class="list-tag">${item.list || '未分类'}</span>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (error) {
                document.getElementById('wordList').innerHTML = `
                    <div style="color: red; text-align: center; padding: 50px;">
                        ❌ 加载失败，请检查网络连接<br>
                        <small style="color: #888;">${error.message}</small>
                    </div>
                `;
            }
        }
        
        loadWords();
    </script>
</body>
</html>
